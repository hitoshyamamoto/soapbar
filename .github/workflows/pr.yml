name: CI — Pull Request

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # needed to post the coverage summary comment

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install lint + type dependencies
        run: uv sync --group lint --group type

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Mypy type check
        run: uv run mypy src/ --strict

  # ── 2. Test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -q --cov=soapbar --cov-report=xml --cov-report=term-missing

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: coverage.xml
          retention-days: 7

  # ── 3. Coverage summary comment on PR ────────────────────────────────────
  coverage-comment:
    name: Coverage Summary
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}

      - name: Post coverage comment
        uses: py-cov-action/python-coverage-comment-action@4c2eefcda8b94596768855a80ac94edc61aba669  # v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_FILE: coverage.xml
