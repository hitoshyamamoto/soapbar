name: CI — Pull Request

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # needed to post the coverage summary comment

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install lint + type dependencies
        run: uv sync --group lint --group type

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Mypy type check
        run: uv run mypy src/ --strict

  # ── 2. Test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -q --cov=soapbar --cov-report=xml --cov-report=term-missing

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: coverage.xml
          retention-days: 7

  # ── 3. Coverage summary comment on PR ────────────────────────────────────
  coverage-comment:
    name: Coverage Summary
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}

      - name: Post coverage comment
        uses: py-cov-action/python-coverage-comment-action@4c2eefcda8b94596768855a80ac94edc61aba669  # v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_FILE: coverage.xml
