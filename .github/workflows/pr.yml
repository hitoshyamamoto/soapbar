name: CI — Pull Request

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write   # needed to post the coverage summary comment

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install lint + type dependencies
        run: uv sync --group lint --group type

      - name: Ruff lint
        run: uv run ruff check src/ tests/ examples/

      - name: Mypy type check
        run: uv run mypy src/ --strict

  # ── 2. Test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -q --cov=soapbar --cov-report=xml --cov-report=term-missing

      - name: Upload coverage data
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}
          path: .coverage
          include-hidden-files: true   # .coverage is dotfile-hidden; excluded by default
          retention-days: 7

  # ── 3. Examples smoke test ───────────────────────────────────────────────
  examples:
    name: Examples
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev + examples dependencies
        run: uv sync --group dev --group examples

      - name: Run example smoke tests
        run: uv run pytest tests/test_examples.py -v --no-cov

  # ── 4. Coverage summary comment on PR ────────────────────────────────────
  coverage-comment:
    name: Coverage Summary
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write        # update the python-coverage-comment-action-data branch + edit prior comment
      pull-requests: write   # post the coverage comment on trusted same-repo PRs
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-pr-${{ github.event.pull_request.number }}

      - name: Post coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@9859324f04326f165029e28728392684ea5c6baf  # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      # Dependabot / fork PRs run with a read-only token, so the step above
      # cannot post directly and instead writes the comment to a file. Store it
      # so the trusted coverage-comment.yml (workflow_run) can publish it.
      - name: Store comment for later publication
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
          retention-days: 1
