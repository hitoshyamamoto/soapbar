name: Release — Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests (must pass before publish)
        run: uv run pytest tests/ --no-cov -q

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/soapbar/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          # Strip the leading "v" from refs/tags/v0.6.1 → 0.6.1
          VERSION="${GITHUB_REF_NAME#v}"
          # CHANGELOG sections start with `## [X.Y.Z] — DATE`. Grab the
          # lines from the matching header up to (but not including) the
          # next `## [` header.
          awk -v ver="## [${VERSION}]" '
            $0 ~ "^" ver { grab=1; print; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for ${VERSION}"
            exit 1
          fi
          # Surface for diagnostics; not used by downstream steps.
          echo "Extracted $(wc -l < release-notes.md) lines for ${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          body_path: release-notes.md
          # tag_name defaults to github.ref_name (already the v0.6.1 tag).
          # Do not mark prerelease — soapbar uses semver-style tags and
          # the Development Status classifier conveys alpha/beta state.
