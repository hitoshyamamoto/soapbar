name: Release — Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests (must pass before publish)
        run: uv run pytest tests/ --no-cov -q

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/soapbar/
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a GitHub Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create GitHub Release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # CHANGELOG sections start with `## [X.Y.Z] — DATE`. Grab the
          # lines from the matching header up to (but not including) the
          # next `## [` header. Use a fixed-string match (index) to avoid
          # regex metacharacter interpretation of the version's dots.
          python3 - <<PY > release-notes.md
          import sys
          version = "${VERSION}"
          header = f"## [{version}]"
          lines = open("CHANGELOG.md").read().splitlines()
          out, grab = [], False
          for line in lines:
              if not grab and line.startswith(header):
                  grab = True
                  out.append(line)
              elif grab and line.startswith("## ["):
                  break
              elif grab:
                  out.append(line)
          sys.stdout.write("\n".join(out))
          PY
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for ${VERSION}"
            exit 1
          fi
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file release-notes.md
