name: CI — Push

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install lint + type dependencies
        run: uv sync --group lint --group type

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/ --strict

  # ── 2. Test matrix ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install xmlsec system libraries
        # `apt-get update` first: the runner image ships a stale package index
        # that can pin a since-superseded version (e.g. libnss3-dev), which then
        # 404s at download time and fails the whole job. Refreshing the index
        # resolves the current versions.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config

      - name: Install dev dependencies
        run: uv sync --group dev --group crypto-interop

      - name: Run tests with coverage
        run: uv run pytest tests/ -q --cov=soapbar --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report (Python 3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── 3. Examples smoke test ───────────────────────────────────────────────
  examples:
    name: Examples
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev + examples dependencies
        run: uv sync --group dev --group examples

      - name: Run example smoke tests
        run: uv run pytest tests/test_examples.py -v --no-cov
