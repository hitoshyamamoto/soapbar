[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "soapbar"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["lxml>=5.0"]

[project.optional-dependencies]
client = ["httpx>=0.27"]
all    = ["httpx>=0.27"]

[dependency-groups]
dev  = ["pytest>=8", "pytest-asyncio>=0.21", "coverage[toml]"]
lint = ["ruff"]
type = ["mypy", "types-lxml"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E","F","W","I","N","UP","B","SIM"]

[tool.mypy]
strict = true
python_version = "3.10"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["soapbar"]
